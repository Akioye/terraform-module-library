name: Terraform Plan

on:
  pull_request:
    branches:
      - master
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform-plan.yml"

# Cancel in-progress runs on the same PR when a new commit is pushed
concurrency:
  group: terraform-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # -------------------------------------------------------
  # Plan — runs for dev, staging, prod in parallel
  # -------------------------------------------------------
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to post PR comments

    strategy:
      fail-fast: false       # run all envs even if one fails
      matrix:
        environment: [dev, staging, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # -------------------------------------------------------
      # Init
      # -------------------------------------------------------
      - name: Terraform Init (${{ matrix.environment }})
        id: init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -input=false
        env:
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

      # -------------------------------------------------------
      # Validate — catches syntax errors before plan
      # -------------------------------------------------------
      - name: Terraform Validate (${{ matrix.environment }})
        id: validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate -no-color

      # -------------------------------------------------------
      # Plan — captures output for PR comment
      # -------------------------------------------------------
      - name: Terraform Plan (${{ matrix.environment }})
        id: plan
        working-directory: environments/${{ matrix.environment }}
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true
        env:
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

      # -------------------------------------------------------
      # Truncate plan output if too long for a PR comment
      # GitHub comments have a 65536 character limit
      # -------------------------------------------------------
      - name: Truncate plan output
        id: truncate
        run: |
          PLAN=$(cat environments/${{ matrix.environment }}/plan_output.txt)
          MAX_LENGTH=60000
          if [ ${#PLAN} -gt $MAX_LENGTH ]; then
            PLAN="${PLAN:0:$MAX_LENGTH}"$'\n\n... [truncated — see Actions log for full output]'
          fi
          # Use a delimiter to safely set multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "plan<<$EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Post plan result as PR comment
      # Finds an existing comment for this env and updates it,
      # or creates a new one — keeps PR comments clean
      # -------------------------------------------------------
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const environment = '${{ matrix.environment }}';
            const planOutput  = `${{ steps.truncate.outputs.plan }}`;
            const initOutcome = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';

            const statusIcon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const body = `
            ## Terraform Plan — \`${environment}\`

            | Step | Result |
            |---|---|
            | Init | ${statusIcon(initOutcome)} ${initOutcome} |
            | Validate | ${statusIcon(validateOutcome)} ${validateOutcome} |
            | Plan | ${statusIcon(planOutcome)} ${planOutcome} |

            <details>
            <summary>📋 Show plan output</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            > 🔒 Pushed by @${{ github.actor }} · Run [\`#${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            // Find existing comment for this environment and update it
            const marker = `<!-- terraform-plan-${environment} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existingComment.id,
                body:       marker + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: context.issue.number,
                body:       marker + body,
              });
            }

      # -------------------------------------------------------
      # Fail the job if plan failed
      # (plan runs with continue-on-error so we can post the
      # comment first, then fail the job here)
      # -------------------------------------------------------
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # -------------------------------------------------------
  # Gate — single job that requires ALL env plans to pass
  # Add this as a required status check in branch protection
  # -------------------------------------------------------
  all-plans-passed:
    name: All plans passed
    runs-on: ubuntu-latest
    needs: plan
    if: always()

    steps:
      - name: Check all plans succeeded
        run: |
          if [ "${{ needs.plan.result }}" != "success" ]; then
            echo "One or more environment plans failed. Blocking merge."
            exit 1
          fi
          echo "All environment plans passed. Safe to merge."
